version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: your_app
      POSTGRES_PASSWORD: your_app
      POSTGRES_DB: your_app_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U your_app -d your_app_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      APP_PORT: 3001
      DATABASE_URL: postgresql://your_app:your_app@postgres:5432/your_app_db
      DATABASE_SYNC: "false"
      AUTH_JWT_SECRET: change_me_jwt_docker
      AUTH_REFRESH_SECRET: change_me_refresh_docker
      AUTH_JWT_TOKEN_EXPIRES_IN: 15m
      AUTH_REFRESH_TOKEN_EXPIRES_IN: 3650d
      FRONTEND_DOMAIN: http://localhost:3000
      REDIS_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
