version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      APP_PORT: 3001
      APP_NAME: "NestNext-cleanArch API"
      API_PREFIX: api
      APP_FALLBACK_LANGUAGE: en
      APP_HEADER_LANGUAGE: x-custom-lang
      FRONTEND_DOMAIN: http://localhost:3000
      BACKEND_DOMAIN: http://localhost:3001
      DATABASE_URL: mongodb://mongo:27017/${DB_NAME:-your_app_db}
      DATABASE_NAME: ${DB_NAME:-your_app_db}
      AUTH_JWT_SECRET: change_me_in_production
      AUTH_JWT_TOKEN_EXPIRES_IN: 15m
      AUTH_REFRESH_SECRET: change_me_refresh_in_production
      AUTH_REFRESH_TOKEN_EXPIRES_IN: 3650d
      REDIS_ENABLED: "true"
      REDIS_URL: redis://redis:6379
      REDIS_SESSION_PREFIX: auth
      REDIS_SESSION_TTL_SECONDS: "2592000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongo_data:
  redis_data:
